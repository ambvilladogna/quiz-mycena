<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Micologico — Il Naso del Micologo</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f9f7f2;
            --surface: #ffffff;
            --border: #e2ddd5;
            --border-hover: #c8c0b4;
            --text-primary: #1a1814;
            --text-secondary: #6b6560;
            --text-hint: #9e9891;
            --green-fill: #e1f5ee;
            --green-border: #1d9e75;
            --green-text: #085041;
            --red-fill: #fcebeb;
            --red-border: #e24b4a;
            --red-text: #501313;
            --accent: #1d9e75;
            --radius: 12px;
            --radius-sm: 8px;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem 4rem;
        }

        header {
            text-align: center;
            max-width: 580px;
            margin-bottom: 2.5rem;
        }

        .club-label {
            font-family: 'Georgia', serif;
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--text-hint);
            margin-bottom: 1rem;
        }

        h1 {
            font-size: clamp(22px, 5vw, 32px);
            font-weight: normal;
            line-height: 1.3;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }

        h1 em {
            font-style: italic;
            color: var(--accent);
        }

        .subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            max-width: 580px;
            width: 100%;
        }

        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.75rem;
        }

        .progress-bar {
            flex: 1;
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.4s ease;
            border-radius: 2px;
        }

        .progress-label {
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            font-size: 12px;
            color: var(--text-hint);
            white-space: nowrap;
        }

        .q-text {
            font-size: 17px;
            line-height: 1.6;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }

        .q-hint {
            font-size: 13px;
            color: var(--text-hint);
            font-style: italic;
            margin-top: -1rem;
            margin-bottom: 1.25rem;
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 9px;
        }

        .opt-btn {
            text-align: left;
            padding: 13px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
            transition: background 0.12s, border-color 0.12s;
            line-height: 1.45;
        }

        .opt-btn:hover:not(:disabled) {
            background: #f5f2ec;
            border-color: var(--border-hover);
        }

        .opt-btn:disabled {
            cursor: default;
        }

        .opt-btn.correct {
            background: var(--green-fill);
            border-color: var(--green-border);
            color: var(--green-text);
        }

        .opt-btn.wrong {
            background: var(--red-fill);
            border-color: var(--red-border);
            color: var(--red-text);
        }

        .opt-btn.reveal {
            background: var(--green-fill);
            border-color: var(--green-border);
            color: var(--green-text);
            opacity: 0.65;
        }

        .feedback {
            margin-top: 1.25rem;
            padding: 13px 16px;
            border-radius: var(--radius-sm);
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            font-size: 14px;
            line-height: 1.65;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.ok {
            background: var(--green-fill);
            color: var(--green-text);
            border: 1px solid #9fe1cb;
        }

        .feedback.ko {
            background: var(--red-fill);
            color: var(--red-text);
            border: 1px solid #f09595;
        }

        .next-btn {
            margin-top: 1.25rem;
            padding: 12px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            display: none;
            transition: background 0.12s, border-color 0.12s;
        }

        .next-btn:hover {
            background: #f5f2ec;
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .result-box {
            text-align: center;
            padding: 1rem 0 0.5rem;
        }

        .result-score {
            font-size: 56px;
            font-weight: normal;
            color: var(--accent);
            font-family: 'Georgia', serif;
            line-height: 1;
            margin-bottom: 0.25rem;
        }

        .result-score-label {
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            font-size: 13px;
            color: var(--text-hint);
            margin-bottom: 1.5rem;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.5rem 0;
        }

        .result-title {
            font-size: 20px;
            font-weight: normal;
            font-style: italic;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }

        .result-desc {
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.65;
            max-width: 420px;
            margin: 0 auto 1.75rem;
        }

        .restart-btn {
            padding: 12px 28px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            font-size: 14px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: background 0.12s;
        }

        .restart-btn:hover {
            background: #f5f2ec;
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        footer {
            margin-top: 2rem;
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            font-size: 12px;
            color: var(--text-hint);
            text-align: center;
        }
    </style>
</head>

<body>

    <header>
        <div class="club-label">Mostra del Fungo 2026</div>
        <h1>Il naso del <em>micologo</em></h1>
        <p class="subtitle">Sei domande sull'uso dell'olfatto nell'identificazione fungina.</p>
    </header>

    <div class="card">
        <div class="progress-wrap">
            <div class="progress-bar">
                <div class="progress-fill" id="prog" style="width:0%"></div>
            </div>
            <div class="progress-label" id="prog-label">1 / 6</div>
        </div>
        <div id="quiz-area"></div>
    </div>

    <footer>Quiz a cura d. A.M.B. gruppo di Villa D'Ogna &mdash; contenuto scientifico basato su Kühner (1938) e letteratura
        corrente</footer>

    <script>
        const qs = [
            {
                q: "Sei in un bosco di abeti rossi. Trovi un funghetto che cresce su una pigna in decomposizione. Il cappellino è brunastro, il gambo sottile. Annusi il cappello: sa di candeggina fresca. Cosa stai guardando?",
                hint: null,
                opts: ["Strobilurus esculentus", "Mycena strobilicola", "Marasmius rotula", "Mycena galericulata"],
                correct: 1,
                ok: "Esatto. L'odore di cloro/candeggina è il carattere diagnostico più affidabile di Mycena strobilicola, e la distingue nettamente da Strobilurus esculentus che cresce sullo stesso substrato.",
                ko: "No. L'odore di candeggina fresca è il carattere diagnostico di Mycena strobilicola — inconfondibile e riproducibile anche dai meno esperti."
            },
            {
                q: "Mycena strobilicola e Strobilurus esculentus crescono entrambi sulle pigne di abete rosso. Oltre all'odore, quale altra differenza aiuta a distinguerli?",
                hint: null,
                opts: [
                    "Il colore delle spore: bianche in Mycena, marroni in Strobilurus",
                    "Il gambo: flessibile e cartilagineo in Strobilurus, fragile in Mycena",
                    "La taglia: Strobilurus è sempre più grande di Mycena",
                    "Il cappello: traslucido e striato in Mycena, più opaco e compatto in Strobilurus"
                ],
                correct: 3,
                ok: "Corretto. Il cappello di Mycena strobilicola è tipicamente traslucido con striature visibili in controluce, mentre Strobilurus esculentus ha un cappello più opaco e compatto.",
                ko: "Non esattamente. Una differenza morfologica utile è il cappello: traslucido e striato in Mycena strobilicola, più opaco e compatto in Strobilurus esculentus."
            },
            {
                q: "Quale microbotanico ha usato in modo sistematico e rigoroso l'olfatto nelle descrizioni delle specie di Mycena, nella sua opera fondamentale del 1938?",
                hint: null,
                opts: ["Pier Andrea Saccardo", "Robert Kühner", "Elias Magnus Fries", "Meinhard Moser"],
                correct: 1,
                ok: "Giusto. Robert Kühner nel suo \"Le Genre Mycena\" (1938) ha descritto sistematicamente le caratteristiche organolettiche, incluso l'olfatto, per ogni specie trattata.",
                ko: "No. È Robert Kühner, con \"Le Genre Mycena\" (1938), l'autore che ha usato l'olfatto come carattere descrittivo sistematico per questo genere."
            },
            {
                q: "Quale Mycena è nota per il suo caratteristico odore di aglio?",
                hint: "Il nome della specie è un indizio diretto.",
                opts: ["Mycena galericulata", "Mycena rosea", "Mycena alliacea", "Mycena capillaripes"],
                correct: 2,
                ok: "Esatto. Il nome \"alliacea\" deriva da Allium (aglio): l'odore è uno dei caratteri più utili per riconoscere questa specie.",
                ko: "No, è Mycena alliacea. Il nome stesso tradisce la risposta: \"alliacea\" deriva da Allium, il genere dell'aglio."
            },
            {
                q: "Strobilurus esculentus è commestibile, come suggerisce il nome. Perché però raccoglierlo non è sempre conveniente?",
                hint: "Pensa alla taglia e al substrato.",
                opts: [
                    "Perché è tossico da crudo e va cotto a lungo",
                    "Perché ha un sapore amaro che non sparisce con la cottura",
                    "Perché è minuscolo e cresce sparso: serve molta pazienza per raccogliere una quantità utile",
                    "Perché confonderlo con Mycena strobilicola è un rischio reale"
                ],
                correct: 2,
                ok: "Proprio così. Strobilurus esculentus è commestibile e ha un odore gradevole quasi farinoso, ma la taglia ridottissima rende la raccolta poco redditizia nella pratica.",
                ko: "Non esattamente. Il motivo principale è la taglia: è un funghetto minuscolo che cresce sparso, e raccogliere una quantità utile richiede molta pazienza."
            },
            {
                q: "Usare l'olfatto nell'identificazione fungina è utile soprattutto in quale situazione?",
                hint: null,
                opts: [
                    "Sempre, perché l'odore è il carattere più affidabile in assoluto",
                    "Quando le differenze morfologiche tra specie simili non sono determinanti",
                    "Solo per le specie tossiche, che hanno quasi sempre odori sgradevoli",
                    "Solo in laboratorio, con campioni freschi e strumenti adeguati"
                ],
                correct: 1,
                ok: "Corretto. L'olfatto diventa particolarmente prezioso quando la morfologia da sola non basta a separare specie simili — come nel caso di Mycena strobilicola e Strobilurus esculentus.",
                ko: "No. L'olfatto è uno strumento complementare, particolarmente utile quando le differenze morfologiche tra specie simili non sono determinanti."
            }
        ];

        const results = [
            { min: 0, max: 2, title: "Naso da allenare", desc: "Non preoccuparti — l'olfatto nella micologia si impara sul campo. Torna al cartellone e poi riprova!" },
            { min: 3, max: 4, title: "Buon fiuto in sviluppo", desc: "Buona base! Qualche concetto da ripassare, ma sei sulla strada giusta. Con un po' di pratica sul campo ci siamo." },
            { min: 5, max: 6, title: "Naso da micologo", desc: "Ottimo risultato. Hai una solida comprensione dell'uso dell'olfatto nell'identificazione fungina. Annusa con fiducia!" }
        ];

        let cur = 0, score = 0, answered = false;

        function render() {
            const area = document.getElementById('quiz-area');
            const prog = document.getElementById('prog');
            const label = document.getElementById('prog-label');

            if (cur >= qs.length) {
                prog.style.width = '100%';
                label.textContent = '6 / 6';
                const r = results.find(x => score >= x.min && score <= x.max);
                area.innerHTML = `<div class="result-box">
      <div class="result-score">${score}/${qs.length}</div>
      <div class="result-score-label">risposte corrette</div>
      <hr class="divider">
      <div class="result-title">${r.title}</div>
      <div class="result-desc">${r.desc}</div>
      <button class="restart-btn" onclick="restart()">Ricomincia</button>
    </div>`;
                return;
            }

            prog.style.width = ((cur / qs.length) * 100) + '%';
            label.textContent = (cur + 1) + ' / ' + qs.length;
            answered = false;

            const q = qs[cur];
            area.innerHTML = `
    <div class="q-text">${q.q}</div>
    ${q.hint ? `<div class="q-hint">Suggerimento: ${q.hint}</div>` : ''}
    <div class="options" id="opts">
      ${q.opts.map((o, i) => `<button class="opt-btn" id="opt${i}" onclick="choose(${i})">${o}</button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>
    <button class="next-btn" id="nxt" onclick="next()">${cur === qs.length - 1 ? 'Vedi risultato →' : 'Prossima domanda →'}</button>
  `;
        }

        function choose(i) {
            if (answered) return;
            answered = true;
            const q = qs[cur];
            document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
            const fb = document.getElementById('fb');
            if (i === q.correct) {
                score++;
                document.getElementById('opt' + i).classList.add('correct');
                fb.className = 'feedback ok show';
                fb.textContent = q.ok;
            } else {
                document.getElementById('opt' + i).classList.add('wrong');
                document.getElementById('opt' + q.correct).classList.add('reveal');
                fb.className = 'feedback ko show';
                fb.textContent = q.ko;
            }
            document.getElementById('nxt').style.display = 'block';
        }

        function next() { cur++; render(); }
        function restart() { cur = 0; score = 0; render(); }

        render();
    </script>
</body>

</html>
